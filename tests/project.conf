#!/bin/bash
# Project configuration for Conway's Game of Life
# No walkthrough or regtest — interactive simulation, not parser IF

PROJECT_NAME="life"
PROJECT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")/.." && pwd)"
_IFHUB_ROOT="$(cd "$PROJECT_DIR/../.." && pwd)"

# Platform detection: prefer native Windows interpreters
_NATIVE_GLULXE="$_IFHUB_ROOT/tools/interpreters/glulxe.exe"
if [[ ("$OSTYPE" == "msys" || "$OSTYPE" == "cygwin") && -x "$_NATIVE_GLULXE" ]]; then
    PRIMARY_ENGINE_NAME="glulxe"
    PRIMARY_ENGINE_PATH="$_NATIVE_GLULXE"
    PRIMARY_ENGINE_SEED_FLAG="--rngseed"
    PRIMARY_GAME_PATH="$PROJECT_DIR/life.ulx"
else
    PRIMARY_ENGINE_NAME="glulxe"
    PRIMARY_ENGINE_PATH="$HOME/glulxe/glulxe"
    PRIMARY_ENGINE_SEED_FLAG="-s"
    PRIMARY_GAME_PATH="$PROJECT_DIR/life.ulx"
fi

# Pipeline config
PIPELINE_SOUND=false
PIPELINE_HUB_ID="life"
PIPELINE_TESTS=""
