<!--
  play-template.html — Conway's Game of Life (Matrix-themed)

  Tokens: TITLE, STORY_FILE, STORY_PATH, LIB_PATH
  Engine: Parchment 2025.1 (Quixe for Glulx)
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Conway's Game of Life</title>
<meta name="viewport" content="width=device-width, user-scalable=no">
<link rel="stylesheet" href="lib/parchment/parchment.css?v=1773748313">
<link rel="stylesheet" href="lib/parchment/main.css?v=1773748313">

<style>
:root {
  --glkote-buffer-bg: #000000;
  --glkote-buffer-fg: #00cc00;
  --glkote-buffer-reverse-bg: #00cc00;
  --glkote-buffer-reverse-fg: #000000;
  --glkote-buffer-size: 14px;
  --glkote-buffer-line-height: 1.5;
  --glkote-grid-bg: #000000;
  --glkote-grid-fg: #00ff00;
  --glkote-grid-reverse-bg: #00ff00;
  --glkote-grid-reverse-fg: #000000;
  --glkote-grid-size: 16px;
  --glkote-input-fg: #00ff00;
  --glkote-error-border: #ff0000;
  --glkote-warning-border: #ffff00;
  --glkote-prop-family: "SF Mono", "Fira Code", "Cascadia Code", Consolas, "Courier New", monospace;
  --glkote-mono-family: "SF Mono", "Fira Code", "Cascadia Code", Consolas, "Courier New", monospace;
  --glkote-grid-mono-family: var(--glkote-mono-family);

  --asyncglk-ui-bg: #000000;
  --asyncglk-ui-border: #003300;
  --asyncglk-ui-fg: #00cc00;
  --asyncglk-ui-selected: #003300;
  --asyncglk-ui-textbox: #000000;
}

html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  background: #000000;
  overflow: hidden;
}

div#gameport {
  position: absolute;
  inset: 0;
  background: #000000;
}

.WindowFrame {
  background: #000000;
}

/* Grid window — the main simulation display */
.GridWindow {
  padding: 4px 8px;
  font-size: 16px !important;
  line-height: 1.25 !important;
  letter-spacing: 1px;
  border-bottom: 1px solid #003300;
}

/* Cursor highlight (User1 = reverse video) */
.GridWindow .Style_user1 {
  color: #000000 !important;
  background-color: #00ff00 !important;
}

/* Buffer window — instructions */
.BufferWindowInner {
  padding: 20px 40px;
}

/* Style input to blend in — must remain focusable for char events */
.BufferWindow .Input,
.BufferWindow textarea.Input {
  color: #00cc00;
  caret-color: #00cc00;
  background: transparent;
  border: none;
  outline: none;
  font-family: "SF Mono", "Fira Code", "Cascadia Code", Consolas, "Courier New", monospace;
}

/* Hide room description style noise */
.BufferWindow .Style_user1 { display: none; }

.Style_header {
  color: #00ff88;
}

.Style_alert {
  color: #ffcc00;
}

.Style_note {
  color: #008800;
}

/* Scrollbar */
.BufferWindow::-webkit-scrollbar { width: 8px; }
.BufferWindow::-webkit-scrollbar-track { background: #001100; }
.BufferWindow::-webkit-scrollbar-thumb { background: #003300; border-radius: 4px; }
.BufferWindow::-webkit-scrollbar-thumb:hover { background: #005500; }

/* Loading pane */
#loadingpane {
  position: absolute;
  width: 100%;
  text-align: center;
  top: 35%;
  color: #00aa00;
  font-size: 1.2em;
  font-family: "SF Mono", Consolas, "Courier New", monospace;
}

@keyframes pulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}

#loadingpane em {
  animation: pulse 1.5s ease-in-out infinite;
}
</style>

<script src="lib/parchment/jquery.min.js?v=1773748313"></script>
<script src="lib/parchment/ie.js?v=1773748313" nomodule></script>
<script>
    parchment_options = {
        default_story: ['lib/parchment/life.ulx.js'],
        lib_path: 'lib/parchment/',
        story_name: 'life.ulx.js',
        use_proxy: 0,
        do_vm_autosave: 0,
    };
</script>
<script src="lib/parchment/parchment.js?v=1773748313"></script>
<script src="lib/parchment/resourcemap.js?v=1773748313"></script>
<script>
    window.addEventListener('pageshow', function(e) {
        if (e.persisted) { window.location.reload(); }
    });
</script>

</head>
<body>

<div id="gameport">
  <div id="windowport">
    <noscript>
      <div style="text-align:center; padding:40px; color:#00aa00;">
        <h2>Conway's Game of Life</h2>
        <p>JavaScript is required to run this simulation.</p>
      </div>
    </noscript>
  </div>
  <div id="loadingpane">
    <div style="margin-bottom:20px; font-size:1.4em; color:#00ff00; letter-spacing:4px;">Conway's Game of Life</div>
    <img src="lib/parchment/waiting.gif" alt="Loading" style="opacity:0.5"><br>
    <em>Initializing simulation...</em>
  </div>
  <div id="errorpane" style="display:none;">
    <div id="errorcontent">...</div>
  </div>
</div>

<script>
/* ── IF Hub theme listener ── */
(function() {
  function ensureRetroFonts() {
    if (document.getElementById('retro-platform-fonts')) return;
    var link = document.createElement('link');
    link.id = 'retro-platform-fonts';
    link.rel = 'stylesheet';
    link.href = 'https://fonts.googleapis.com/css2?family=Pixelify+Sans&family=Press+Start+2P&family=Silkscreen&family=Sixtyfour&family=Tiny5&family=VT323&family=Workbench&display=swap';
    document.head.appendChild(link);
  }

  function applyPlatformTheme(g, sb) {
    ensureRetroFonts();
    var el = document.getElementById('platform-theme-override');
    if (el) el.remove();
    var style = document.createElement('style');
    style.id = 'platform-theme-override';
    style.textContent =
      'body, html { background: ' + g.bodyBg + ' !important; }\n' +
      '.BufferWindow { color: ' + g.bufferFg + ' !important; background-color: ' + g.bufferBg + ' !important; font-family: ' + g.monoFamily + ' !important; font-size: ' + g.bufferSize + ' !important; line-height: ' + g.bufferLineHeight + ' !important; }\n' +
      '.BufferWindow span { color: ' + g.bufferFg + ' !important; }\n' +
      '.BufferWindow span.reverse { color: ' + g.bufferBg + ' !important; background-color: ' + g.bufferFg + ' !important; }\n' +
      '.BufferWindow .Style_input { color: ' + g.inputFg + ' !important; }\n' +
      '.BufferWindow .Style_emphasized { color: ' + g.emphFg + ' !important; }\n' +
      '.BufferWindow .Style_header { color: ' + g.headerFg + ' !important; }\n' +
      '.BufferWindow .Style_subheader,\n' +
      '.BufferWindow .Style_alert { color: ' + g.headerFg + ' !important; }\n' +
      '.BufferWindow .Input,\n' +
      '.BufferWindow textarea.Input { color: ' + g.inputFg + ' !important; caret-color: ' + g.inputFg + '; font-family: ' + g.monoFamily + ' !important; }\n' +
      '.GridWindow { color: ' + g.gridFg + ' !important; background-color: ' + g.gridBg + ' !important; padding: 4px 12px !important; border: none !important; border-radius: 0 !important; box-shadow: none !important; margin: 0 !important; width: 100% !important; box-sizing: border-box !important; }\n' +
      '.GridWindow span { color: ' + g.gridFg + ' !important; background-color: ' + g.gridBg + ' !important; }\n' +
      '.GridWindow span.reverse { color: ' + g.gridFg + ' !important; background-color: ' + g.gridBg + ' !important; }\n' +
      '#loadingpane { color: ' + g.bufferFg + '; background: ' + g.bodyBg + '; font-family: ' + g.monoFamily + '; }\n' +
      '.WindowFrame { background: transparent !important; }\n' +
      'div#gameport { background: linear-gradient(to bottom, ' + g.gridBg + ' 0px, ' + g.gridBg + ' ' + ((parseInt(g.gridLineHeight) || 20) + 10) + 'px, ' + g.bufferBg + ' ' + ((parseInt(g.gridLineHeight) || 20) + 10) + 'px) !important; }\n' +
      '* { scrollbar-color: ' + sb.thumb + ' ' + sb.track + '; }\n' +
      '::-webkit-scrollbar { width: 10px; background: ' + sb.track + '; }\n' +
      '::-webkit-scrollbar-thumb { background: ' + sb.thumb + '; border-radius: 4px; }\n' +
      '::-webkit-scrollbar-thumb:hover { background: ' + sb.thumbHover + '; }\n';
    document.head.appendChild(style);
    setTimeout(function() { window.dispatchEvent(new Event('resize')); }, 50);
  }

  function removePlatformTheme() {
    var el = document.getElementById('platform-theme-override');
    if (el) el.remove();
    setTimeout(function() { window.dispatchEvent(new Event('resize')); }, 50);
  }

  window.addEventListener('message', function(e) {
    if (!e.data) return;
    if (e.data.type === 'ifhub:applyTheme') {
      applyPlatformTheme(e.data.game, e.data.scrollbar);
    }
    if (e.data.type === 'ifhub:restoreOverlay') {
      removePlatformTheme();
    }
  });

  // Auto-apply theme from URL param (full-page mode from hub)
  var urlTheme = new URLSearchParams(window.location.search).get('theme');
  if (urlTheme && urlTheme !== 'classic') {
    var s = document.createElement('script');
    s.src = '/ifhub/themes.js';
    s.onload = function() {
      var t = getTheme(urlTheme);
      if (t) applyPlatformTheme(t.game, t.scrollbar);
    };
    document.head.appendChild(s);
  }
})();
</script>

</body>
</html>
